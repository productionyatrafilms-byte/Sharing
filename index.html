<!doctype html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <meta
      name="description"
      content="Sharing is Caring - A platform promoting the value of sharing"
    />

    <title data-lang-key="homeTitlea"></title>

    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <main class="home-pg">
      <video
        class="bg-video"
        autoplay
        muted
        loop
        playsinline
        preload="metadata"
        poster="assets/home-pg-1.png"
      >
        <source src="assets/videos/HOME PG.mp4" type="video/mp4" />
        Your browser does not support the video tag.
      </video>

      <nav>
        <div class="home-btn"></div>

        <div class="translate-button-container">
          <div class="translate-button" id="englishButton">E</div>
          <div class="translate-button" id="hindiButton">H</div>
          <div class="translate-button" id="gujaratiButton">G</div>
        </div>
      </nav>

      <a href="sharing.html" id="homeTitleLink">
        <div class="home-title">
          <span data-lang-key="homeTitle">Sharing</span>
          <p data-lang-key="homeSubtitle"></p>
        </div>
      </a>
    </main>

    <!-- Audio -->
    <audio id="homeClickAudio" preload="auto">
      <source src="assets/audio/1.mp3" type="audio/mpeg" />
    </audio>

    <script src="script.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const homeTitleLink = document.getElementById("homeTitleLink");
        const homeClickAudio = document.getElementById("homeClickAudio");

        if (!homeTitleLink || !homeClickAudio) {
          console.log("Home title link or audio not found");
          return;
        }

        homeClickAudio.volume = 1;
        homeClickAudio.load();

        homeClickAudio.addEventListener("loadeddata", () => {
          console.log("Audio loaded successfully");
        });

        homeClickAudio.addEventListener("error", () => {
          console.log("Audio loading failed. Check path: assets/audio/1.mp3");
        });

        homeTitleLink.addEventListener("click", async (e) => {
          e.preventDefault();

          homeTitleLink.style.pointerEvents = "none";

          try {
            homeClickAudio.pause();
            homeClickAudio.currentTime = 0;

            await homeClickAudio.play();

            setTimeout(() => {
              window.location.href = "sharing.html";
            }, 2000);
          } catch (err) {
            console.log("Audio play failed:", err);

            setTimeout(() => {
              window.location.href = "sharing.html";
            }, 2000);
          }
        });
      });
    </script>
  </body>
</html>
